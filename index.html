<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<!--
  هذا هو الإصلاح الأساسي لمشكلة "تعذّر تشغيل البث":
  كثير من سيرفرات IPTV ترفض الطلبات القادمة من Origin مختلف (مثل صفحة
  GitHub Pages هذه) لأن متصفح المستخدم يرسل تلقائياً ترويسة Referer
  تشير إلى عنوان الصفحة الحالية، فيظن السيرفر أنها محاولة "hotlinking"
  ويرفضها. الترويسة Referer لا يمكن للجافاسكربت تعديلها يدوياً (forbidden
  header)، لكن يمكن إلغاؤها بالكامل عبر meta tag — هذا يجعل المتصفح لا
  يرسل أي Referer إطلاقاً مع طلبات التحميل (manifest + segments).
-->
<meta name="referrer" content="no-referrer"/>
<title>بث مباشر</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.8.0/dist/mpegts.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background:#000;
    width:100%; height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
  }
  #wrap {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  video {
    width:100%; height:100%;
    object-fit:contain;
    background:#000;
  }
  /* ===== loading overlay ===== */
  #loading {
    position:fixed; inset:0;
    background:#000;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:#fff; gap:14px; z-index:10;
  }
  .spinner {
    width:48px; height:48px;
    border:4px solid #333;
    border-top-color:#4fc3f7;
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loading p { font-size:15px; opacity:.8; }

  /* ===== error overlay ===== */
  #error {
    display:none;
    position:fixed; inset:0;
    background:#0a0a0a;
    align-items:center; justify-content:center;
    flex-direction:column; gap:16px;
    padding:24px; text-align:center; color:#fff; z-index:10;
  }
  #error .icon { font-size:48px; }
  #error h2 { font-size:18px; }
  #error p  { font-size:13px; color:#aaa; line-height:1.6; }
  .btn {
    display:inline-block;
    background:#1e88e5; color:#fff;
    padding:12px 24px; border-radius:8px;
    text-decoration:none; font-size:14px;
    margin-top:4px;
  }
  .btn-retry {
    background:#333; cursor:pointer; border:none; color:#fff;
    padding:12px 24px; border-radius:8px; font-size:14px;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>جارٍ تحميل البث...</p>
</div>

<div id="error">
  <div class="icon">📡</div>
  <h2>تعذّر تشغيل البث</h2>
  <p>
    قد يكون البث غير متاح حالياً أو محجوباً داخل تيليجرام.<br/>
    جرّب إعادة المحاولة، أو افتح الرابط في متصفح خارجي.
  </p>
  <a id="ext-link" class="btn" href="#" target="_blank">🔗 فتح في المتصفح</a>
  <button class="btn-retry" onclick="retryPlay()">🔄 إعادة المحاولة</button>
</div>

<div id="wrap">
  <video id="video" controls playsinline webkit-playsinline></video>
</div>

<script>
  const params    = new URLSearchParams(location.search);
  const streamUrl = params.get("url") ? decodeURIComponent(params.get("url")) : "";
  const subUrl    = params.get("sub")  ? decodeURIComponent(params.get("sub"))  : "";

  const video   = document.getElementById("video");
  const loading = document.getElementById("loading");
  const errDiv  = document.getElementById("error");
  const extLink = document.getElementById("ext-link");

  let hlsInstance    = null;
  let mpegtsInstance = null;

  // ── Telegram WebApp setup ──────────────────────────────
  if (window.Telegram?.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    try { tg.requestFullscreen?.(); } catch(e){}
    // شاشة لا تنطفئ (Android)
    try { navigator.wakeLock?.request("screen"); } catch(e){}
  }

  extLink.href = streamUrl || "#";

  function hideLoading() { loading.style.display = "none"; }
  function showError()   {
    hideLoading();
    errDiv.style.display = "flex";
  }

  function addSubtitle() {
    if (!subUrl) return;
    const t = document.createElement("track");
    t.kind = "subtitles"; t.label = "العربية";
    t.srclang = "ar"; t.src = subUrl; t.default = true;
    video.appendChild(t);
  }

  function destroyAll() {
    if (hlsInstance)    { try { hlsInstance.destroy(); }    catch(e){} hlsInstance = null; }
    if (mpegtsInstance) { try { mpegtsInstance.destroy(); } catch(e){} mpegtsInstance = null; }
    video.removeAttribute("src");
    video.load();
  }

  function retryPlay() {
    errDiv.style.display = "none";
    loading.style.display = "flex";
    startPlay();
  }

  /**
   * يحدد نوع البث من الرابط:
   * - .m3u8 / m3u8 في الرابط → HLS (hls.js)
   * - .ts أو أي امتداد آخر (شائع في بثوث IPTV الخام MPEG-TS) → mpegts.js
   */
  function detectStreamType(url) {
    const clean = url.split("?")[0].toLowerCase();
    if (clean.endsWith(".m3u8") || clean.includes(".m3u8")) return "hls";
    if (clean.endsWith(".ts")   || clean.includes(".ts"))   return "mpegts";
    return "hls";   // افتراضي
  }

  function startPlay() {
    if (!streamUrl) { showError(); return; }
    destroyAll();

    const type = detectStreamType(streamUrl);

    if (type === "mpegts") {
      playMpegts();
    } else {
      playHls();
    }
  }

  // ===== بث MPEG-TS خام (.ts) — يُستخدم في باقات IPTV من نوع Xtream Codes =====
  function playMpegts() {
    if (typeof mpegts === "undefined" || !mpegts.isSupported()) {
      // لا يدعمه المتصفح (Media Source Extensions غير متاحة) — جرّب HLS كحل أخير
      playHls();
      return;
    }

    mpegtsInstance = mpegts.createPlayer(
      { type: "mse", isLive: true, url: streamUrl },
      {
        enableWorker: true,
        liveBufferLatencyChasing: true,
        liveBufferLatencyMaxLatency: 3.0,
        liveBufferLatencyMinRemain: 0.5,
      }
    );
    mpegtsInstance.attachMediaElement(video);

    let started = false;
    mpegtsInstance.on(mpegts.Events.MEDIA_INFO, () => {
      if (started) return;
      started = true;
      hideLoading();
      addSubtitle();
      video.play().catch(() => hideLoading());
    });

    let retried = false;
    mpegtsInstance.on(mpegts.Events.ERROR, () => {
      if (!retried) {
        retried = true;
        try {
          destroyAll();
          playHls();   // جرّب hls.js كنوع بديل (احتياط: قد يكون الرابط m3u8 رغم الامتداد)
          return;
        } catch (e) {}
      }
      showError();
    });

    try {
      mpegtsInstance.load();
      mpegtsInstance.play();
    } catch (e) {
      showError();
    }

    // مهلة أمان: إن لم يبدأ التشغيل خلال 12 ثانية أظهر الخطأ
    setTimeout(() => { if (!started && loading.style.display !== "none") showError(); }, 12000);
  }

  // ===== بث HLS عادي (.m3u8) =====
  function playHls() {
    if (Hls.isSupported()) {
      hlsInstance = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        // بث مباشر (Live) — إعدادات مهيّأة لتقليل الـ buffering وتأخير البداية
        liveSyncDurationCount: 3,
        liveMaxLatencyDurationCount: 6,
        manifestLoadingTimeOut: 15000,
        manifestLoadingMaxRetry: 4,
        manifestLoadingRetryDelay: 1000,
        levelLoadingTimeOut: 15000,
        levelLoadingMaxRetry: 4,
        fragLoadingTimeOut: 20000,
        fragLoadingMaxRetry: 6,
        xhrSetup: function(xhr) {
          xhr.withCredentials = false;
        },
      });
      hlsInstance.loadSource(streamUrl);
      hlsInstance.attachMedia(video);

      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        hideLoading();
        addSubtitle();
        video.play().catch(() => {
          // بعض المتصفحات تمنع autoplay — نظهر الفيديو فقط
          hideLoading();
        });
      });

      let retried = false;
      hlsInstance.on(Hls.Events.ERROR, (_, data) => {
        if (!data.fatal) return;
        // محاولة استرجاع تلقائية واحدة قبل اعتبار الخطأ نهائياً
        if (!retried && (data.type === Hls.ErrorTypes.NETWORK_ERROR ||
                          data.type === Hls.ErrorTypes.MEDIA_ERROR)) {
          retried = true;
          try {
            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              hlsInstance.startLoad();
            } else {
              hlsInstance.recoverMediaError();
            }
            return;
          } catch (e) { /* تابع لمحاولة native */ }
        }
        tryNative();
      });

    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      // Safari / iOS — يدعم HLS مدمجاً
      video.src = streamUrl;
      video.addEventListener("loadedmetadata", () => {
        hideLoading();
        addSubtitle();
        video.play().catch(() => hideLoading());
      }, {once: true});
      video.addEventListener("error", tryNative, {once: true});

    } else {
      tryNative();
    }
  }

  function tryNative() {
    // محاولة أخيرة: src مباشر
    destroyAll();
    video.src = streamUrl;
    video.load();
    const onOk  = () => { hideLoading(); video.play().catch(()=>{}); };
    const onErr = () => { showError(); };
    video.addEventListener("canplay", onOk,  {once: true});
    video.addEventListener("error",   onErr, {once: true});
    // timeout 8 ثوانٍ
    setTimeout(() => {
      if (errDiv.style.display !== "flex" && loading.style.display !== "none") {
        showError();
      }
    }, 8000);
  }

  startPlay();
</script>
</body>
</html>
