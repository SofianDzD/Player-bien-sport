<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>بث مباشر</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#000; width:100%; height:100%; overflow:hidden; font-family:Arial,sans-serif; }

  video {
    position:fixed; inset:0;
    width:100%; height:100%;
    object-fit:contain;
    background:#000;
    z-index:1;
  }

  #loading {
    position:fixed; inset:0;
    background:#000;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:#fff; gap:14px; z-index:10;
  }
  .spinner {
    width:48px; height:48px;
    border:4px solid #333;
    border-top-color:#4fc3f7;
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loading p { font-size:15px; opacity:.8; }

  #error {
    display:none;
    position:fixed; inset:0;
    background:#0a0a0a;
    align-items:center; justify-content:center;
    flex-direction:column; gap:16px;
    padding:24px; text-align:center; color:#fff; z-index:10;
  }
  #error .icon { font-size:52px; }
  #error h2 { font-size:19px; }
  #error p { font-size:13px; color:#aaa; line-height:1.7; }
  .btn-retry {
    background:#1e88e5; cursor:pointer; border:none; color:#fff;
    padding:13px 32px; border-radius:10px; font-size:15px; font-family:Arial;
  }
  .btn-retry:active { opacity:.8; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>جارٍ تحميل البث...</p>
</div>

<div id="error">
  <div class="icon">📡</div>
  <h2>تعذّر تشغيل البث</h2>
  <p>تأكد من اتصالك بالإنترنت<br/>ثم أعد المحاولة.</p>
  <button class="btn-retry" onclick="retryPlay()">🔄 إعادة المحاولة</button>
</div>

<video id="video" controls playsinline webkit-playsinline
  x-webkit-airplay="allow"
  controlsList="nodownload">
</video>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<script>
  const params    = new URLSearchParams(location.search);
  const streamUrl = params.get("url") ? decodeURIComponent(params.get("url")) : "";

  const video   = document.getElementById("video");
  const loading = document.getElementById("loading");
  const errDiv  = document.getElementById("error");

  let hlsInstance = null;
  let retryCount  = 0;

  // ── Telegram WebApp ──────────────────────────────────
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    try { tg.requestFullscreen?.(); } catch(e) {}
    try { navigator.wakeLock?.request("screen"); } catch(e) {}
  }

  function hideLoading() { loading.style.display = "none"; }
  function showError()   { hideLoading(); errDiv.style.display = "flex"; }

  function retryPlay() {
    retryCount = 0;
    errDiv.style.display   = "none";
    loading.style.display  = "flex";
    startPlay();
  }

  function startPlay() {
    if (!streamUrl) { showError(); return; }
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    video.src = "";

    // ── الطريقة الأولى: native HLS (أندرويد + iOS) ──────
    // تيليجرام WebView يدعم HLS مباشرة بدون hls.js
    // وهذا يتجاوز مشكلة CORS لأن الطلب يذهب من WebView وليس من JS
    if (video.canPlayType("application/vnd.apple.mpegurl") ||
        video.canPlayType("application/x-mpegURL")) {
      video.src = streamUrl;
      video.load();
      video.addEventListener("canplay", () => {
        hideLoading();
        video.play().catch(() => { hideLoading(); });
      }, { once: true });
      video.addEventListener("error", () => {
        // إذا فشل native → جرب hls.js
        tryHlsJs();
      }, { once: true });
      setTimeout(() => {
        if (loading.style.display !== "none") tryHlsJs();
      }, 6000);
      return;
    }

    // ── الطريقة الثانية: hls.js ──────────────────────────
    tryHlsJs();
  }

  function tryHlsJs() {
    if (!Hls.isSupported()) { showError(); return; }
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

    hlsInstance = new Hls({
      enableWorker:   false,   // WebView لا يدعم Workers دائماً
      lowLatencyMode: true,
      maxBufferLength: 30,
      xhrSetup: (xhr) => {
        try {
          xhr.setRequestHeader("User-Agent",
            "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 Chrome/124.0 Mobile Safari/537.36");
        } catch(e) {}
      }
    });

    hlsInstance.loadSource(streamUrl);
    hlsInstance.attachMedia(video);

    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      hideLoading();
      video.play().catch(() => { hideLoading(); });
    });

    hlsInstance.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        retryCount++;
        if (retryCount <= 2) {
          // إعادة المحاولة تلقائياً مرتين
          setTimeout(() => {
            hlsInstance?.destroy();
            hlsInstance = null;
            tryHlsJs();
          }, 2000);
        } else {
          showError();
        }
      }
    });
  }

  startPlay();
</script>
</body>
</html>
